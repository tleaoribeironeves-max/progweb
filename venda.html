<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciamento de Vendas</title>
    <link rel="stylesheet" href="venda.css">
</head>
<body>
    <div class="container">
        <h1>Finalizando Venda</h1>
        
        <div class="form-group">
            <label>Nome do Vendedor:</label>
            <input type="text" id="vendedor">
            
            <label>Valor da Venda:</label>
            <input type="number" id="valor">
            
            <div class="buttons">
                <button onclick="cadastrarVenda()" class="btn-cadastrar">Cadastrar</button>
                <button onclick="limparCampos()" class="btn-limpar">Limpar Campos</button>
            </div>
        </div>

        <div class="global-actions">
            <button onclick="removerUltimo()" class="btn-warning">Remover Último</button>
            <button onclick="limparTudo()" class="btn-danger">Limpar Tudo</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Vendedor</th>
                    <th>Valor</th>
                    <th>Desconto</th>
                    <th>Valor com Desconto</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="tabelaVendas">
                </tbody>
        </table>
    </div>
    <script src="venda.js"></script>
</body>
</html>
